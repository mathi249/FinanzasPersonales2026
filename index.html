<body>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ============================================================
   CONFIGURACIÓN SUPABASE (opcional)
   Para activar sincronización en la nube, completá estos datos.
   Si quedan vacíos, la app usa almacenamiento local del navegador.
   ============================================================ */
const SUPABASE_CONFIG = {
  url: "",          // ej: https://xxxxx.supabase.co
  apiKey: "",       // anon key o sb_publishable_...
  table: "movimientos"
};

/* ---- Helper Supabase con lógica robusta (formato de header y URL) ---- */
function buildSupabase(cfg) {
  if (!cfg.url || !cfg.apiKey) return null;
  let base = cfg.url.trim().replace(/\/+$/, "");
  base = base.replace(/\/rest\/v1$/, ""); // evita path duplicado
  const rest = base + "/rest/v1/" + cfg.table;
  const isNewFormat = /^sb_(publishable|secret)_/.test(cfg.apiKey.trim());
  const headers = { "apikey": cfg.apiKey.trim(), "Content-Type": "application/json" };
  if (!isNewFormat) headers["Authorization"] = "Bearer " + cfg.apiKey.trim();
  return { rest, headers };
}
const SB = buildSupabase(SUPABASE_CONFIG);

/* ============================================================
   PERSISTENCIA
   ============================================================ */
const LS_KEY = "rdl_finanzas_movimientos";

async function cargarMovimientos() {
  if (SB) {
    try {
      const r = await fetch(SB.rest + "?select=*&order=fecha.desc", { headers: SB.headers });
      if (!r.ok) throw new Error("fetch");
      return await r.json();
    } catch (e) {
      console.warn("Supabase no disponible, usando local", e);
    }
  }
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}

async function guardarLocal(lista) {
  localStorage.setItem(LS_KEY, JSON.stringify(lista));
}

async function insertarMov(mov) {
  if (SB) {
    const r = await fetch(SB.rest, {
      method: "POST",
      headers: { ...SB.headers, "Prefer": "return=representation" },
      body: JSON.stringify(mov)
    });
    if (r.ok) { const d = await r.json(); return d[0]; }
  }
  return mov;
}
async function actualizarMov(id, mov) {
  if (SB) {
    await fetch(SB.rest + "?id=eq." + id, {
      method: "PATCH", headers: SB.headers, body: JSON.stringify(mov)
    });
  }
}
async function borrarMov(id) {
  if (SB) {
    await fetch(SB.rest + "?id=eq." + id, { method: "DELETE", headers: SB.headers });
  }
}

/* ============================================================
   UTILIDADES
   ============================================================ */
const fmt = (n) => "$" + (Number(n)||0).toLocaleString("es-AR", {minimumFractionDigits:0, maximumFractionDigits:0});
const hoy = () => new Date().toISOString().slice(0,10);
const uid = () => Date.now() + Math.floor(Math.random()*1000);

const CATEGORIAS = {
  ingreso: ["Sueldo", "Freelance / RDL", "Ventas", "Reintegros", "Inversiones", "Regalo", "Otros ingresos"],
  gasto: ["Alquiler / Hogar", "Supermercado", "Servicios", "Transporte", "Salud", "Educación", "Ocio", "Restaurantes", "Ropa", "Impuestos", "Suscripciones", "Deudas / Tarjetas", "Ahorro / Inversión", "Otros gastos"]
};

const COLORES_CAT = ["#6366f1","#8b5cf6","#22d3ee","#f472b6","#fb923c","#34d399","#facc15","#f87171","#a78bfa","#38bdf8","#fbbf24","#4ade80","#e879f9","#60a5fa"];

const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

/* ============================================================
   COMPONENTE: CAMPO DE FORMULARIO (a nivel módulo — evita focus-loss)
   ============================================================ */

    <div>

      {children}

}
const inputCls = "w-full bg-[#0f1424] border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-100 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition";

/* ============================================================
   COMPONENTE: GRÁFICO (nombre ChartBox — evita conflicto con Chart global)
   ============================================================ */
function ChartBox({type, data, options, height=260}) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, { type, data, options });
    return () => { if (inst.current) inst.current.destroy(); };
  }, [JSON.stringify(data), type]);
  return <div style={{height}}><canvas ref={ref}></canvas></div>;
}

/* ============================================================

   ============================================================ */
function Login({onLogin}) {
  const [state, setState] = useState({ usuario: "", clave: "", error: "" });

    if (state.usuario.trim().toLowerCase() === "admin" && state.clave === "rdl2025") {

    } else {

  };
  return (
    <div className="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">

            </svg>

        </div>
        <div className="space-y-4">
          <Field label="Usuario">
            <input className={inputCls} value={state.usuario} placeholder="admin"
              onChange={e => setState(s => ({...s, usuario: e.target.value, error:""}))}
              onKeyDown={e => e.key === "Enter" && submit()} />
          </Field>
          <Field label="Contraseña">
            <input type="password" className={inputCls} value={state.clave} placeholder="••••••••"
              onChange={e => setState(s => ({...s, clave: e.target.value, error:""}))}
              onKeyDown={e => e.key === "Enter" && submit()} />
          </Field>
          {state.error && <p className="text-xs text-red-400 text-center">{state.error}</p>}
          <button onClick={submit} className="w-full rdl-gradient text-white font-semibold py-2.5 rounded-lg hover:opacity-90 transition shadow-lg text-sm">
            Ingresar
          </button>
          <p className="text-[11px] text-slate-600 text-center pt-1">admin / rdl2025</p>
        </div>

      <div className="absolute bottom-4 text-center w-full text-[11px] text-slate-600">
        RDL Analytics · Reporting, Data & Lighting

}

/* Iconos SVG simples */
const Icon = {

/* ============================================================
   FORMULARIO DE MOVIMIENTO (modal)
   ============================================================ */
function MovForm({inicial, onGuardar, onCerrar}) {
  const [form, setForm] = useState(inicial || {
    tipo: "gasto", fecha: hoy(), categoria: "", descripcion: "", monto: "", metodo: "Efectivo"
  });
  const set = (k,v) => setForm(f => ({...f, [k]: v}));
  const cats = CATEGORIAS[form.tipo] || [];

  const submit = () => {
    if (!form.monto || Number(form.monto) <= 0) { alert("Ingresá un monto válido"); return; }
    if (!form.categoria) { alert("Elegí una categoría"); return; }
    onGuardar({
      ...form,
      monto: Number(form.monto),
      id: form.id || uid()
    });
  };

  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 px-4 fade-in" onClick={onCerrar}>
      <div className="glass rounded-2xl p-6 w-full max-w-md shadow-2xl" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h3 className="text-lg font-bold text-white font-display">{form.id ? "Editar movimiento" : "Nuevo movimiento"}</h3>
          <button onClick={onCerrar} className="text-slate-400 hover:text-white text-xl leading-none">✕</button>
        </div>

        <div className="grid grid-cols-2 gap-2 mb-4">
          <button onClick={() => { set("tipo","ingreso"); set("categoria",""); }}
            className={"py-2.5 rounded-lg text-sm font-semibold transition border " + (form.tipo==="ingreso" ? "bg-emerald-500/20 border-emerald-500 text-emerald-300" : "bg-[#0f1424] border-slate-700 text-slate-400")}>
            ↑ Ingreso
          </button>
          <button onClick={() => { set("tipo","gasto"); set("categoria",""); }}
            className={"py-2.5 rounded-lg text-sm font-semibold transition border " + (form.tipo==="gasto" ? "bg-red-500/20 border-red-500 text-red-300" : "bg-[#0f1424] border-slate-700 text-slate-400")}>
            ↓ Gasto
          </button>
        </div>

        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <Field label="Fecha">
              <input type="date" className={inputCls} value={form.fecha} onChange={e => set("fecha", e.target.value)} />
            </Field>
            <Field label="Monto">
              <input type="number" className={inputCls} value={form.monto} placeholder="0" onChange={e => set("monto", e.target.value)} />
            </Field>
          </div>
          <Field label="Categoría">
            <select className={inputCls} value={form.categoria} onChange={e => set("categoria", e.target.value)}>
              <option value="">Seleccionar…</option>
              {cats.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Descripción">
            <input className={inputCls} value={form.descripcion} placeholder="Detalle opcional" onChange={e => set("descripcion", e.target.value)} />
          </Field>
          <Field label="Método de pago">
            <select className={inputCls} value={form.metodo} onChange={e => set("metodo", e.target.value)}>
              {["Efectivo","Débito","Crédito","Transferencia","Mercado Pago","Otro"].map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </Field>
        </div>

        <div className="flex gap-3 mt-6">
          <button onClick={onCerrar} className="flex-1 bg-[#0f1424] border border-slate-700 text-slate-300 py-2.5 rounded-lg text-sm font-semibold hover:bg-slate-800 transition">Cancelar</button>
          <button onClick={submit} className="flex-1 rdl-gradient text-white py-2.5 rounded-lg text-sm font-semibold hover:opacity-90 transition shadow-lg">Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP PRINCIPAL
   ============================================================ */
function App() {
  const [logged, setLogged] = useState(false);
  const [movs, setMovs] = useState([]);
  const [tab, setTab] = useState("dashboard");
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [editando, setEditando] = useState(null);
  const [confirmar, setConfirmar] = useState(null);

  // filtros
  const [fMes, setFMes] = useState("todos");
  const [fTipo, setFTipo] = useState("todos");
  const [fCat, setFCat] = useState("todas");
  const [busqueda, setBusqueda] = useState("");

  useEffect(() => {
    if (logged) {
      cargarMovimientos().then(d => { setMovs(d); setLoading(false); });
    }
  }, [logged]);

  const persistir = async (nuevaLista) => {
    setMovs(nuevaLista);
    await guardarLocal(nuevaLista);
  };

  const handleGuardar = async (mov) => {
    if (editando) {
      await actualizarMov(mov.id, mov);
      persistir(movs.map(m => m.id === mov.id ? mov : m));
    } else {
      const guardado = await insertarMov(mov);
      persistir([guardado, ...movs]);
    }
    setShowForm(false); setEditando(null);
  };

  const handleBorrar = async (id) => {
    await borrarMov(id);
    persistir(movs.filter(m => m.id !== id));
    setConfirmar(null);
  };

  /* ----- Filtrado ----- */
  const movsFiltrados = useMemo(() => {
    return movs.filter(m => {
      if (fTipo !== "todos" && m.tipo !== fTipo) return false;
      if (fCat !== "todas" && m.categoria !== fCat) return false;
      if (fMes !== "todos") {
        const mesMov = (m.fecha||"").slice(0,7);
        if (mesMov !== fMes) return false;
      }
      if (busqueda) {
        const t = (m.descripcion + " " + m.categoria + " " + m.metodo).toLowerCase();
        if (!t.includes(busqueda.toLowerCase())) return false;
      }
      return true;
    }).sort((a,b) => (b.fecha||"").localeCompare(a.fecha||""));
  }, [movs, fMes, fTipo, fCat, busqueda]);

  /* ----- KPIs (sobre filtrados) ----- */
  const totalIngresos = movsFiltrados.filter(m => m.tipo==="ingreso").reduce((s,m)=>s+Number(m.monto),0);
  const totalGastos = movsFiltrados.filter(m => m.tipo==="gasto").reduce((s,m)=>s+Number(m.monto),0);
  const balance = totalIngresos - totalGastos;
  const tasaAhorro = totalIngresos > 0 ? Math.round((balance/totalIngresos)*100) : 0;

  /* ----- Meses disponibles ----- */
  const mesesDisp = useMemo(() => {
    const set = new Set(movs.map(m => (m.fecha||"").slice(0,7)).filter(Boolean));
    return Array.from(set).sort().reverse();
  }, [movs]);
  const mesLabel = (ym) => { const [y,m]=ym.split("-"); return MESES[parseInt(m)-1]+" "+y; };

  /* ----- Datos gráfico: gastos por categoría ----- */
  const gastosPorCat = useMemo(() => {
    const map = {};
    movsFiltrados.filter(m=>m.tipo==="gasto").forEach(m => { map[m.categoria]=(map[m.categoria]||0)+Number(m.monto); });
    const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
    return {
      labels: entries.map(e=>e[0]),
      data: entries.map(e=>e[1])
    };
  }, [movsFiltrados]);

  /* ----- Datos gráfico: evolución mensual (todos los movs, no filtrados) ----- */
  const evolucion = useMemo(() => {
    const map = {};
    movs.forEach(m => {
      const ym = (m.fecha||"").slice(0,7);
      if (!ym) return;
      if (!map[ym]) map[ym] = {ing:0, gas:0};
      if (m.tipo==="ingreso") map[ym].ing += Number(m.monto);
      else map[ym].gas += Number(m.monto);
    });
    const keys = Object.keys(map).sort().slice(-6);
    return {
      labels: keys.map(mesLabel),
      ingresos: keys.map(k=>map[k].ing),
      gastos: keys.map(k=>map[k].gas)
    };
  }, [movs]);

  /* ----- Exportar PDF ----- */
  const exportarPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFillColor(99,102,241);
    doc.rect(0,0,210,28,"F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(18); doc.setFont(undefined,"bold");
    doc.text("RDL Finanzas", 14, 14);
    doc.setFontSize(10); doc.setFont(undefined,"normal");
    const periodoTxt = fMes==="todos" ? "Todos los períodos" : mesLabel(fMes);
    doc.text("Reporte de movimientos · " + periodoTxt, 14, 21);

    doc.setTextColor(30,30,30);
    doc.setFontSize(11); doc.setFont(undefined,"bold");
    doc.text("Resumen", 14, 40);
    doc.setFont(undefined,"normal"); doc.setFontSize(10);
    doc.text("Ingresos: " + fmt(totalIngresos), 14, 48);
    doc.text("Gastos: " + fmt(totalGastos), 80, 48);
    doc.text("Balance: " + fmt(balance), 140, 48);

    const rows = movsFiltrados.map(m => [
      m.fecha, m.tipo==="ingreso"?"Ingreso":"Gasto", m.categoria,
      m.descripcion||"-", m.metodo, fmt(m.monto)
    ]);
    doc.autoTable({
      startY: 55,
      head: [["Fecha","Tipo","Categoría","Descripción","Método","Monto"]],
      body: rows,
      theme: "striped",
      headStyles: { fillColor: [99,102,241], fontSize: 9 },
      bodyStyles: { fontSize: 8 },
      alternateRowStyles: { fillColor: [245,245,250] }
    });
    doc.save("RDL_Finanzas_" + periodoTxt.replace(" ","_") + ".pdf");
  };

  if (!logged) return <Login onLogin={() => setLogged(true)} />;

  const catsFiltro = fTipo==="ingreso" ? CATEGORIAS.ingreso : fTipo==="gasto" ? CATEGORIAS.gasto : [...CATEGORIAS.ingreso, ...CATEGORIAS.gasto];

  return (
    <div className="min-h-screen text-slate-100">
      {/* HEADER */}
      <header className="glass border-b border-indigo-500/20 sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3.5 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-lg rdl-gradient flex items-center justify-center shadow-lg">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            </div>
            <div>
              <h1 className="text-base font-bold text-white font-display leading-tight">RDL <span className="rdl-text-gradient">Finanzas</span></h1>
              <p className="text-[10px] text-slate-500 leading-tight">Finanzas personales</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            {!SB && <span className="hidden sm:inline text-[10px] text-amber-400/80 bg-amber-500/10 border border-amber-500/20 px-2 py-1 rounded-md">Local</span>}
            <button onClick={() => setLogged(false)} className="text-xs text-slate-400 hover:text-white px-3 py-1.5 rounded-lg hover:bg-slate-800 transition">Salir</button>
          </div>
        </div>
        {/* TABS */}
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1">
          {[["dashboard","Panel"],["movimientos","Movimientos"]].map(([k,label]) => (
            <button key={k} onClick={() => setTab(k)}
              className={"px-4 py-2.5 text-sm font-semibold transition border-b-2 " + (tab===k ? "border-indigo-500 text-white" : "border-transparent text-slate-400 hover:text-slate-200")}>
              {label}
            </button>
          ))}
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6">

        {/* Barra de filtros */}
        <div className="glass rounded-xl p-3 mb-5 flex flex-wrap gap-2 items-center">
          <select value={fMes} onChange={e=>setFMes(e.target.value)} className="bg-[#0f1424] border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-200 outline-none focus:border-indigo-500">
            <option value="todos">Todos los meses</option>
            {mesesDisp.map(m => <option key={m} value={m}>{mesLabel(m)}</option>)}
          </select>
          <select value={fTipo} onChange={e=>{setFTipo(e.target.value); setFCat("todas");}} className="bg-[#0f1424] border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-200 outline-none focus:border-indigo-500">
            <option value="todos">Ingresos y gastos</option>
            <option value="ingreso">Solo ingresos</option>
            <option value="gasto">Solo gastos</option>
          </select>
          <select value={fCat} onChange={e=>setFCat(e.target.value)} className="bg-[#0f1424] border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-200 outline-none focus:border-indigo-500">
            <option value="todas">Todas las categorías</option>
            {catsFiltro.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
          {tab==="movimientos" && (
            <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="Buscar…"
              className="bg-[#0f1424] border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-200 outline-none focus:border-indigo-500 flex-1 min-w-[120px]" />
          )}
          <div className="flex-1"></div>
          <button onClick={exportarPDF} className="flex items-center gap-1.5 bg-[#0f1424] border border-slate-700 text-slate-300 px-3 py-2 rounded-lg text-xs font-semibold hover:border-indigo-500 transition">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            PDF
          </button>
          <button onClick={() => { setEditando(null); setShowForm(true); }} className="flex items-center gap-1.5 rdl-gradient text-white px-4 py-2 rounded-lg text-xs font-semibold hover:opacity-90 transition shadow-lg">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Nuevo
          </button>
        </div>

        {loading ? (
          <div className="text-center py-20 text-slate-500 text-sm">Cargando…</div>
        ) : tab === "dashboard" ? (
          <div className="fade-in space-y-5">
            {/* KPIs */}
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
              <KpiCard label="Ingresos" valor={fmt(totalIngresos)} icon={Icon.in} color="#34d399" sub={movsFiltrados.filter(m=>m.tipo==="ingreso").length + " movimientos"} />
              <KpiCard label="Gastos" valor={fmt(totalGastos)} icon={Icon.out} color="#f87171" sub={movsFiltrados.filter(m=>m.tipo==="gasto").length + " movimientos"} />
              <KpiCard label="Balance" valor={fmt(balance)} icon={Icon.bal} color={balance>=0?"#6366f1":"#f87171"} sub={balance>=0?"Superávit":"Déficit"} />
              <KpiCard label="Tasa de ahorro" valor={tasaAhorro + "%"} icon={Icon.save} color="#22d3ee" sub="del total de ingresos" />
            </div>

            {movs.length === 0 ? (
              <div className="glass rounded-xl p-12 text-center">
                <div className="w-14 h-14 rounded-2xl rdl-gradient flex items-center justify-center mx-auto mb-4 opacity-80">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>
                </div>
                <h3 className="text-white font-semibold mb-1">Todavía no hay movimientos</h3>
                <p className="text-slate-400 text-sm mb-5">Cargá tu primer ingreso o gasto para ver el análisis.</p>
                <button onClick={() => { setEditando(null); setShowForm(true); }} className="rdl-gradient text-white px-5 py-2.5 rounded-lg text-sm font-semibold hover:opacity-90 transition shadow-lg">Cargar movimiento</button>
              </div>
            ) : (
              <div className="grid lg:grid-cols-3 gap-5">
                {/* Evolución */}
                <div className="glass rounded-xl p-5 lg:col-span-2">
                  <h3 className="text-sm font-semibold text-white mb-4 font-display">Evolución mensual</h3>
                  {evolucion.labels.length > 0 ? (
                    <ChartBox type="bar" height={280}
                      data={{
                        labels: evolucion.labels,
                        datasets: [
                          { label:"Ingresos", data: evolucion.ingresos, backgroundColor:"#34d399", borderRadius:6, barPercentage:0.6, categoryPercentage:0.6 },
                          { label:"Gastos", data: evolucion.gastos, backgroundColor:"#f87171", borderRadius:6, barPercentage:0.6, categoryPercentage:0.6 }
                        ]
                      }}
                      options={{
                        responsive:true, maintainAspectRatio:false,
                        plugins:{ legend:{ labels:{ color:"#cbd5e1", usePointStyle:true, boxWidth:8, font:{size:11} } } },
                        scales:{
                          x:{ ticks:{color:"#94a3b8", font:{size:11}}, grid:{display:false} },
                          y:{ ticks:{color:"#94a3b8", font:{size:11}, callback:v=>"$"+(v/1000)+"k"}, grid:{color:"#1e293b"} }
                        }
                      }} />
                  ) : <p className="text-slate-500 text-sm py-10 text-center">Sin datos para el período</p>}
                </div>

                {/* Gastos por categoría */}
                <div className="glass rounded-xl p-5">
                  <h3 className="text-sm font-semibold text-white mb-4 font-display">Gastos por categoría</h3>
                  {gastosPorCat.labels.length > 0 ? (
                    <ChartBox type="doughnut" height={280}
                      data={{
                        labels: gastosPorCat.labels,
                        datasets: [{ data: gastosPorCat.data, backgroundColor: COLORES_CAT, borderColor:"#0a0e1a", borderWidth:2 }]
                      }}
                      options={{
                        responsive:true, maintainAspectRatio:false, cutout:"62%",
                        plugins:{ legend:{ position:"bottom", labels:{ color:"#cbd5e1", usePointStyle:true, boxWidth:8, padding:10, font:{size:10} } } }
                      }} />
                  ) : <p className="text-slate-500 text-sm py-10 text-center">Sin gastos en el período</p>}
                </div>

                {/* Top categorías (barra) */}
                <div className="glass rounded-xl p-5 lg:col-span-3">
                  <h3 className="text-sm font-semibold text-white mb-4 font-display">Ranking de gastos</h3>
                  {gastosPorCat.labels.length > 0 ? (
                    <div className="space-y-3">
                      {gastosPorCat.labels.slice(0,8).map((cat,i) => {
                        const pct = totalGastos>0 ? (gastosPorCat.data[i]/totalGastos)*100 : 0;
                        return (
                          <div key={cat}>
                            <div className="flex justify-between text-xs mb-1">
                              <span className="text-slate-300">{cat}</span>
                              <span className="text-slate-400 font-medium">{fmt(gastosPorCat.data[i])} · {pct.toFixed(0)}%</span>
                            </div>
                            <div className="h-2 bg-[#0f1424] rounded-full overflow-hidden">
                              <div className="h-full rounded-full" style={{width: pct+"%", background: COLORES_CAT[i%COLORES_CAT.length]}}></div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ) : <p className="text-slate-500 text-sm py-6 text-center">Sin gastos para mostrar</p>}
                </div>
              </div>
            )}
          </div>
        ) : (
          /* TAB MOVIMIENTOS */
          <div className="fade-in glass rounded-xl overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-slate-700/60 text-left">
                    <th className="px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wide">Fecha</th>
                    <th className="px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wide">Tipo</th>
                    <th className="px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wide">Categoría</th>
                    <th className="px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wide hidden md:table-cell">Descripción</th>
                    <th className="px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wide hidden sm:table-cell">Método</th>
                    <th className="px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wide text-right">Monto</th>
                    <th className="px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wide text-right">Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  {movsFiltrados.length === 0 ? (
                    <tr><td colSpan="7" className="px-4 py-12 text-center text-slate-500 text-sm">No hay movimientos que coincidan con los filtros.</td></tr>
                  ) : movsFiltrados.map(m => (
                    <tr key={m.id} className="border-b border-slate-800/50 hover:bg-slate-800/30 transition">
                      <td className="px-4 py-3 text-slate-300 whitespace-nowrap">{m.fecha}</td>
                      <td className="px-4 py-3">
                        <span className={"text-xs font-semibold px-2 py-1 rounded-md " + (m.tipo==="ingreso" ? "bg-emerald-500/15 text-emerald-400" : "bg-red-500/15 text-red-400")}>
                          {m.tipo==="ingreso" ? "↑ Ingreso" : "↓ Gasto"}
                        </span>
                      </td>
                      <td className="px-4 py-3 text-slate-300">{m.categoria}</td>
                      <td className="px-4 py-3 text-slate-400 hidden md:table-cell max-w-[200px] truncate">{m.descripcion || "—"}</td>
                      <td className="px-4 py-3 text-slate-400 hidden sm:table-cell">{m.metodo}</td>
                      <td className={"px-4 py-3 text-right font-semibold whitespace-nowrap " + (m.tipo==="ingreso" ? "text-emerald-400" : "text-red-400")}>
                        {m.tipo==="ingreso" ? "+" : "−"}{fmt(m.monto)}
                      </td>
                      <td className="px-4 py-3 text-right whitespace-nowrap">
                        <button onClick={() => { setEditando(m); setShowForm(true); }} className="text-slate-400 hover:text-indigo-400 p-1.5 transition" title="Editar">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button onClick={() => setConfirmar(m)} className="text-slate-400 hover:text-red-400 p-1.5 transition" title="Eliminar">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
                {movsFiltrados.length > 0 && (
                  <tfoot>
                    <tr className="border-t border-slate-700/60 bg-[#0f1424]/50">
                      <td colSpan="5" className="px-4 py-3 text-sm font-semibold text-slate-300">Balance del período ({movsFiltrados.length})</td>
                      <td className={"px-4 py-3 text-right font-bold " + (balance>=0 ? "text-emerald-400" : "text-red-400")}>{fmt(balance)}</td>
                      <td></td>
                    </tr>
                  </tfoot>
                )}
              </table>
            </div>
          </div>
        )}
      </main>

      <footer className="text-center py-6 text-[11px] text-slate-600">
        RDL Analytics · Reporting, Data & Lighting
      </footer>

      {showForm && <MovForm inicial={editando} onGuardar={handleGuardar} onCerrar={() => { setShowForm(false); setEditando(null); }} />}
      {confirmar && <ConfirmDialog texto={`¿Eliminar el movimiento de ${fmt(confirmar.monto)} en "${confirmar.categoria}"?`} onSi={() => handleBorrar(confirmar.id)} onNo={() => setConfirmar(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
